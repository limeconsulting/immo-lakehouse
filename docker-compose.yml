version: "3.9"

networks:
  lake-net:

volumes:
  minio-data:
  clickhouse-data:
  nessie-data:

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9100:9000"   # S3
      - "9101:9001"   # console
    volumes:
      - minio-data:/data
    networks: [lake-net]

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    environment:
      QUARKUS_HTTP_PORT: "19120"
      NESSIE_VERSION_STORE_TYPE: "ROCKSDB"
      NESSIE_ROCKSDB_DIRECTORY: "/var/lib/nessie"
    ports:
      - "19120:19120"
    volumes:
      - nessie-data:/var/lib/nessie
    networks: [lake-net]

  spark:
    image: bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "18082:8080"  # Spark UI (18080 already used by sec-lab)
    networks: [lake-net]

  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
    depends_on: [spark]
    networks: [lake-net]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: immo
      CLICKHOUSE_PASSWORD: {CHANGE_ME}
      CLICKHOUSE_DB: immo
    ports:
      - "8124:8123"   # HTTP
      - "9011:9000"   # Native
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [lake-net]
