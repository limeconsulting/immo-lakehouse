version: "3.9"

networks:
  lake-net:

volumes:
  minio-data:
  clickhouse-data:
  superset-db-data:
  superset-home:

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    networks: [lake-net]

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    environment:
      QUARKUS_HTTP_PORT: "19120"
      NESSIE_VERSION_STORE_TYPE: "IN_MEMORY"
    ports:
      - "19120:19120"
    networks: [lake-net]

  spark:
    image: bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "18082:8080"
    networks: [lake-net]

  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
    depends_on: [spark]
    networks: [lake-net]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: immo
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: immo
    ports:
      - "8124:8123"
      - "9011:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [lake-net]

  superset-db:
    image: postgres:16
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [lake-net]

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    depends_on:
      superset-db:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    ports:
      - "8088:8088"
    volumes:
      - superset-home:/app/superset_home
    command: >
      /bin/sh -c "superset db upgrade &&
      superset fab create-admin
      --username \"$${SUPERSET_ADMIN_USERNAME}\"
      --firstname Superset
      --lastname Admin
      --email \"$${SUPERSET_ADMIN_EMAIL}\"
      --password \"$${SUPERSET_ADMIN_PASSWORD}\" || true &&
      superset init &&
      /usr/bin/run-server.sh"
    networks: [lake-net]
